kind = "web"
previewPath = "/"
title = "CivicBridge"
version = "1.0.0"
id = "artifacts/civicbridge-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22998
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/civicbridge-web run dev"

[services.env]
PORT = "22998"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/civicbridge-web", "run", "build"]
publicDir = "artifacts/civicbridge-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
